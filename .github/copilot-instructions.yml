  compile_only: true
  timeout_minutes: 20

validation:
  require_compilation: true
  require_tests: true

dependencies:
  - build-essential
  - cmake
  - libdb5.3-dev
  - libdb5.3++-dev
  - libssl-dev
  - libboost-all-dev
  - libminiupnpc-dev
  - libevent-dev
  - pkg-config
