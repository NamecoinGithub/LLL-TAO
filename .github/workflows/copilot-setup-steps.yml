name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .devcontainer/setup.sh
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .devcontainer/setup.sh

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: sudo bash .devcontainer/setup.sh
